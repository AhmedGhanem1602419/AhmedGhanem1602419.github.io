<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Ghanem | Senior Accountant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
 --main:#22c55e;
 --bg:#020617;
 --card:#0f172a;
 --text:#fff;
}

body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:var(--bg);
 color:var(--text);
 overflow-x:hidden;
}

/* LOADER */
#loader{
 position:fixed;
 width:100%;
 height:100%;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:9999;
}
#loader h1{
 color:#22c55e;
 animation:pulse 1s infinite;
}
@keyframes pulse{
 0%{opacity:.3}
 50%{opacity:1}
 100%{opacity:.3}
}

/* CUSTOM CURSOR */
.cursor{
 width:20px;
 height:20px;
 border:2px solid #22c55e;
 border-radius:50%;
 position:fixed;
 pointer-events:none;
 transform:translate(-50%,-50%);
}

/* HEADER */
header{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 position:relative;
}

h1{
 font-size:60px;
}

.btn{
 padding:12px 25px;
 background:var(--main);
 color:#fff;
 border-radius:30px;
 text-decoration:none;
 margin:10px;
 transition:.3s;
}
.btn:hover{
 transform:scale(1.1);
}

/* PARALLAX */
.parallax{
 position:absolute;
 width:100%;
 height:100%;
 background:radial-gradient(circle,#22c55e22,#000);
 z-index:-1;
}

/* CARD */
.card{
 background:var(--card);
 padding:20px;
 border-radius:15px;
 margin:20px;
 transition:.3s;
 transform-style:preserve-3d;
}
.card:hover{
 transform:rotateY(10deg) rotateX(10deg);
}

/* SECTIONS */
section{
 padding:80px 10%;
}

/* SCROLL ANIMATION */
.hidden{
 opacity:0;
 transform:translateY(40px);
 transition:1s;
}
.show{
 opacity:1;
 transform:translateY(0);
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><h1>Loading...</h1></div>

<!-- CURSOR -->
<div class="cursor"></div>

<header>
<div class="parallax"></div>

<h1>Ahmed Ghanem</h1>
<p>Financial Precision Meets Business Intelligence</p>

<a href="Ahmed_Ghanem_CV.pdf" class="btn">Download CV</a>
<a href="https://wa.me/966565368979" class="btn">WhatsApp</a>

</header>

<section class="hidden">
<h2>About Me</h2>
<div class="card">
Senior Accountant with 5+ years of experience transforming financial data into insights.
</div>
</section>

<section class="hidden">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</section>

<section class="hidden">
<h2>Experience</h2>
<div class="card">Senior Accountant - Mezan</div>
<div class="card">Accountant - Qurtoba</div>
</section>

<script>

/* LOADER */
window.onload = ()=>{
 document.getElementById("loader").style.display="none";
}

/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
 cursor.style.top=e.clientY+"px";
 cursor.style.left=e.clientX+"px";
});

/* SCROLL */
const obs=new IntersectionObserver(entries=>{
 entries.forEach(e=>{
  if(e.isIntersecting){e.target.classList.add("show")}
 });
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

/* PARALLAX */
document.addEventListener("mousemove",e=>{
 document.querySelector(".parallax").style.transform=
 `translate(${e.clientX/50}px,${e.clientY/50}px)`;
});

/* CHART */
new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{
  labels:["Jan","Feb","Mar","Apr"],
  datasets:[{
   label:"Revenue",
   data:[12,19,10,25],
   backgroundColor:"#22c55e"
  }]
 }
});

</script>

</body>
</html>
